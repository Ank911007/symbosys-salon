<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark circular background -->
  <circle cx="32" cy="32" r="32" fill="#0e110f"/>

  <!-- Left blade (top-left to pivot) -->
  <path d="M28 12 C26 16, 27 22, 30 28 L32 30 L30 28 C28 24, 26 18, 28 12 Z" fill="#a4c2a8"/>
  <path d="M28 12 Q25 18 30 28 L31 30" stroke="#a4c2a8" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Right blade (top-right to pivot) -->
  <path d="M36 12 C38 16, 37 22, 34 28 L32 30 L34 28 C36 24, 38 18, 36 12 Z" fill="#a4c2a8"/>
  <path d="M36 12 Q39 18 34 28 L33 30" stroke="#a4c2a8" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Pivot screw -->
  <circle cx="32" cy="30" r="1.8" fill="#0e110f" stroke="#a4c2a8" stroke-width="1.2"/>

  <!-- Left handle arm (pivot down to loop) -->
  <path d="M31 31 C29 34, 26 37, 24 40" stroke="#a4c2a8" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Right handle arm (pivot down to loop) -->
  <path d="M33 31 C35 34, 38 37, 40 40" stroke="#a4c2a8" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Left finger loop -->
  <ellipse cx="22" cy="44" rx="5" ry="5.5" fill="none" stroke="#a4c2a8" stroke-width="2"/>

  <!-- Right finger loop -->
  <ellipse cx="42" cy="44" rx="5" ry="5.5" fill="none" stroke="#a4c2a8" stroke-width="2"/>
</svg>